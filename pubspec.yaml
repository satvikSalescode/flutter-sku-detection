name: sku_detector
description: On-device SKU detection using YOLO. SKU matching pipeline pending DINOv2 integration.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Inference ───────────────────────────────────────────────────────────────
  onnxruntime: ^1.4.1          # YOLO + MobileCLIP (image & text encoder)

  # ── Image handling ───────────────────────────────────────────────────────────
  image_picker: ^1.1.2         # camera / gallery
  image: ^4.2.0                # decode, resize, crop

  # ── Networking ───────────────────────────────────────────────────────────────
  http: ^1.2.0                 # backend API calls (backend mode)

  # ── Storage ──────────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3   # settings persistence
  path_provider: ^2.1.3        # documents / cache directory for local catalog

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
